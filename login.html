<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>Inloggen - Stenzo Textiles</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      max-width: 180px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    p {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 28px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #E5006D; }
    button {
      width: 100%;
      padding: 13px;
      background: #E5006D;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #c4005d; }
    .error {
      color: #c0392b;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="stenzo-logo.png" alt="Stenzo Textiles" class="logo">
    <h1>Toegang vereist</h1>
    <p>Voer het wachtwoord in om de catalogus te bekijken.</p>
    <form id="loginForm" onsubmit="doLogin(event)">
      <input type="password" id="pw" placeholder="Wachtwoord" autofocus autocomplete="current-password">
      <button type="submit">Inloggen</button>
      <div class="error" id="err">Onjuist wachtwoord. Probeer opnieuw.</div>
    </form>
  </div>
  <script>
    var PW_HASH = '074250b6b55b79088ce132bc248751c0e3888c10edae5bd9a1231890d9c5d6a1';

    async function sha256(str) {
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function doLogin(e) {
      e.preventDefault();
      var pw = document.getElementById('pw').value;
      var hash = await sha256(pw);
      if (hash === PW_HASH) {
        sessionStorage.setItem('stenzo_auth', PW_HASH);
        var params = new URLSearchParams(window.location.search);
        var next = params.get('next') || 'index.html';
        window.location.replace(next);
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }

    // Already logged in? Redirect directly
    if (sessionStorage.getItem('stenzo_auth') === PW_HASH) {
      var params = new URLSearchParams(window.location.search);
      window.location.replace(params.get('next') || 'index.html');
    }
  </script>
</body>
</html>
